<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="white"/>
  <!-- Asterisk shape made of rotated rectangles -->
  <g transform="translate(50,50)">
    <!-- Vertical bar -->
    <rect x="-11" y="-42" width="22" height="84" fill="#C0992F" rx="2"/>
    <!-- Horizontal bar -->
    <rect x="-42" y="-11" width="84" height="22" fill="#C0992F" rx="2"/>
    <!-- Diagonal 45deg -->
    <rect x="-11" y="-42" width="22" height="84" fill="#C0992F" rx="2" transform="rotate(45)"/>
    <!-- Diagonal -45deg -->
    <rect x="-11" y="-42" width="22" height="84" fill="#C0992F" rx="2" transform="rotate(-45)"/>
  </g>
</svg>